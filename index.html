<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간제근무 기간제교사 인건비 산정</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Lucide 아이콘 프록시 설정
        const { 
            Calculator, Calendar, CreditCard, AlertCircle, ChevronDown, 
            Table, Info, Download, ClipboardList, User, CalendarRange, 
            Settings2, ReceiptText, Save, FileUp, FileSpreadsheet, Mail
        } = typeof lucide !== 'undefined' ? lucide : {};

        // 아이콘 컴포넌트 래퍼
        const Icon = ({ name: IconComp, size = 20, className = "" }) => {
            return IconComp ? <IconComp size={size} className={className} /> : null;
        };

        const App = () => {
            const fileInputRef = React.useRef(null);

            const salaryTable = {
                1: 2041500, 2: 2103300, 3: 2166000, 4: 2228500, 5: 2291500, 6: 2354400, 7: 2416600,
                8: 2478600, 9: 2495600, 10: 2516700, 11: 2538300, 12: 2585900, 13: 2657500, 14: 2773700,
                15: 2848900, 16: 2924500, 17: 3000600, 18: 3076800, 19: 3152500, 20: 3228600, 21: 3600700,
                22: 3733600, 23: 3865300, 24: 3997500, 25: 4129400, 26: 4261900, 27: 4400100, 28: 4538000,
                29: 4682100, 30: 4826800, 31: 4971100, 32: 5115200, 33: 5261000, 34: 5406400, 35: 5552300,
                36: 5698100, 37: 5844000, 38: 5989700, 39: 6135800, 40: 6281700
            };

            const [userInfo, setUserInfo] = React.useState({
                affiliation: '', name: '', contractStart: '2026-03-01', contractEnd: '2027-02-28'
            });

            const [baseInfo, setBaseInfo] = React.useState({
                hobong: 14, salary: 2773700, teachingAllowance: 250000, researchAllowance: 75000,
                mealAllowance: 160000, jeonggeunAdd: 50000, insuranceRate: 0.1314, personalInsuranceRate: 0.095, taxRate: 0.033
            });

            const [dates, setDates] = React.useState({
                summerStart: '2026-07-20', summerEnd: '2026-08-20', summerNonOpStart: '', summerNonOpEnd: '',
                winterStart: '2026-12-28', winterEnd: '2027-01-31', winterNonOpStart: '', winterNonOpEnd: '',
                extraHoliday1: '', extraHoliday2: ''
            });

            const [results, setResults] = React.useState([]);
            const [detailedLogs, setDetailedLogs] = React.useState([]);

            const handleHobongChange = (h) => {
                const s = salaryTable[h] || 2773700;
                setBaseInfo({ ...baseInfo, hobong: h, salary: s });
            };

            const getDaysInMonth = (year, month) => new Date(year, month, 0).getDate();

            const isEightHourDay = (dateStr) => {
                if (!dateStr) return false;
                const d = new Date(dateStr);
                const sStart = new Date(dates.summerStart);
                const sEnd = new Date(dates.summerEnd);
                const wStart = new Date(dates.winterStart);
                const wEnd = new Date(dates.winterEnd);
                const isInSummer = d >= sStart && d <= sEnd;
                const isInWinter = d >= wStart && d <= wEnd;
                
                const snStart = dates.summerNonOpStart ? new Date(dates.summerNonOpStart) : null;
                const snEnd = dates.summerNonOpEnd ? new Date(dates.summerNonOpEnd) : null;
                const wnStart = dates.winterNonOpStart ? new Date(dates.winterNonOpStart) : null;
                const wnEnd = dates.winterNonOpEnd ? new Date(dates.winterNonOpEnd) : null;
                
                const isSummerNonOp = snStart && snEnd && d >= snStart && d <= snEnd;
                const isWinterNonOp = wnStart && wnEnd && d >= wnStart && d <= wnEnd;
                
                return (isInSummer && !isSummerNonOp) || (isInWinter && !isWinterNonOp);
            };

            const isZeroHourDay = (dateStr) => {
                if (!dateStr) return false;
                return dateStr === dates.extraHoliday1 || dateStr === dates.extraHoliday2;
            };

            const calculateQuarterly = () => {
                const quarters = [
                    { id: 1, name: '1분기', months: [3, 4, 5], year: 2026 },
                    { id: 2, name: '2분기', months: [6, 7, 8], year: 2026 },
                    { id: 3, name: '3분기', months: [9, 10, 11], year: 2026 },
                    { id: 4, name: '4분기', months: [12, 1, 2], year: 2026 },
                ];
                const logs = [];
                const quarterlyResults = quarters.map((q) => {
                    let qData = { basic: 0, teaching: 0, research: 0, meal: 0, jeonggeun: 0, jeonggeunAdd: 0, holiday: 0, insurance: 0 };
                    q.months.forEach((m) => {
                        const year = (q.id === 4 && (m === 1 || m === 2)) ? q.year + 1 : q.year;
                        const daysInMonth = getDaysInMonth(year, m);
                        let fullWorkDays = 0; let noWorkDays = 0;
                        for (let d = 1; d <= daysInMonth; d++) {
                            const cur = `${year}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                            if (isEightHourDay(cur)) fullWorkDays++;
                            else if (isZeroHourDay(cur)) noWorkDays++;
                        }
                        const halfWorkDays = daysInMonth - fullWorkDays - noWorkDays;
                        const mBasic = (baseInfo.salary / daysInMonth * fullWorkDays * 1.0) + (baseInfo.salary / daysInMonth * halfWorkDays * 0.5);
                        const mTeaching = (baseInfo.teachingAllowance / daysInMonth * fullWorkDays * 1.0) + (baseInfo.teachingAllowance / daysInMonth * halfWorkDays * 0.5);
                        const mResearch = (baseInfo.researchAllowance / daysInMonth * fullWorkDays * 1.0) + (baseInfo.researchAllowance / daysInMonth * halfWorkDays * 0.5);
                        const mJeonggeunAddBase = (baseInfo.jeonggeunAdd / daysInMonth * fullWorkDays * 1.0) + (baseInfo.jeonggeunAdd / daysInMonth * halfWorkDays * 0.5);
                        
                        let mJeonggeun = 0; let mHoliday = 0;
                        if ((q.id === 2 && m === 7) || (q.id === 4 && m === 1)) mJeonggeun = baseInfo.salary * 0.5 * 0.5;
                        if ((q.id === 3 && m === 9) || (q.id === 4 && m === 2)) mHoliday = baseInfo.salary * 0.6 * 0.5;
                        
                        const mTotalPreTax = mBasic + mTeaching + mResearch + baseInfo.mealAllowance + mJeonggeun + mJeonggeunAddBase + mHoliday;
                        const mPersonalIns = mTotalPreTax * baseInfo.personalInsuranceRate;
                        const mTax = (mTotalPreTax - mPersonalIns) * baseInfo.taxRate;
                        const mNetPay = mTotalPreTax - mPersonalIns - mTax;

                        logs.push({
                            month: `${year}.${m}`, fullWorkDays, halfWorkDays, noWorkDays, totalDays: daysInMonth,
                            mBasic, mTeaching, mResearch, mJeonggeun, mJeonggeunAdd: mJeonggeunAddBase, mHoliday, mTotalPreTax, mNetPay
                        });
                        qData.basic += mBasic; qData.teaching += mTeaching; qData.research += mResearch; qData.jeonggeunAdd += mJeonggeunAddBase;
                        qData.meal += baseInfo.mealAllowance; qData.jeonggeun += mJeonggeun; qData.holiday += mHoliday;
                    });
                    const taxableSum = qData.basic + qData.teaching + qData.research + qData.meal + qData.jeonggeun + qData.jeonggeunAdd;
                    qData.insurance = (taxableSum + qData.holiday) * baseInfo.insuranceRate;
                    qData.total = taxableSum + qData.holiday + qData.insurance;
                    return { ...q, ...qData };
                });
                setResults(quarterlyResults);
                setDetailedLogs(logs);
            };

            React.useEffect(() => { calculateQuarterly(); }, [dates, baseInfo, userInfo.contractStart, userInfo.contractEnd]);

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 pb-20">
                    <div className="max-w-[1400px] mx-auto p-4 md:p-8 space-y-8">
                        {/* Header */}
                        <div className="bg-white p-6 rounded-[1.5rem] shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-indigo-600 rounded-xl text-white shadow-lg"><Icon name={ReceiptText} size={24} /></div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800">시간제근무 기간제교사 인건비 산정</h1>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">2026.04.26 Current Config</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3 bg-slate-50 px-4 py-2 rounded-xl border border-slate-100">
                                <Icon name={Calendar} size={16} className="text-slate-400" />
                                <span className="text-xs font-black text-slate-700">{userInfo.contractStart} ~ {userInfo.contractEnd}</span>
                            </div>
                        </div>

                        {/* Settings Grid */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                                <div className="bg-slate-900 px-8 py-4 text-white font-bold flex items-center gap-2">
                                    <Icon name={Settings2} size={18} className="text-indigo-400" /> 근무 설정
                                </div>
                                <div className="p-8 space-y-8">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase">학교명</label>
                                            <input type="text" value={userInfo.affiliation} onChange={e => setUserInfo({...userInfo, affiliation: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase">교사 성명</label>
                                            <input type="text" value={userInfo.name} onChange={e => setUserInfo({...userInfo, name: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold" />
                                        </div>
                                    </div>
                                    <div className="pt-6 border-t border-slate-100 grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100/50">
                                            <span className="text-[11px] font-black text-indigo-500 block mb-3 uppercase">여름 방학 (8시간)</span>
                                            <div className="flex gap-2">
                                                <input type="date" value={dates.summerStart} onChange={e => setDates({...dates, summerStart: e.target.value})} className="flex-1 text-xs p-2.5 rounded-lg border border-slate-200" />
                                                <input type="date" value={dates.summerEnd} onChange={e => setDates({...dates, summerEnd: e.target.value})} className="flex-1 text-xs p-2.5 rounded-lg border border-slate-200" />
                                            </div>
                                        </div>
                                        <div className="p-5 bg-blue-50/50 rounded-2xl border border-blue-100/50">
                                            <span className="text-[11px] font-black text-blue-500 block mb-3 uppercase">겨울 방학 (8시간)</span>
                                            <div className="flex gap-2">
                                                <input type="date" value={dates.winterStart} onChange={e => setDates({...dates, winterStart: e.target.value})} className="flex-1 text-xs p-2.5 rounded-lg border border-slate-200" />
                                                <input type="date" value={dates.winterEnd} onChange={e => setDates({...dates, winterEnd: e.target.value})} className="flex-1 text-xs p-2.5 rounded-lg border border-slate-200" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200 space-y-6">
                                <div className="flex items-center gap-2 border-b pb-4"><Icon name={CreditCard} size={20} className="text-indigo-600" /><h3 className="font-bold">급여 기준</h3></div>
                                <div className="space-y-4">
                                    <div className="bg-indigo-600 p-4 rounded-xl text-white">
                                        <label className="text-[10px] font-bold opacity-70 block mb-2">계약 기간</label>
                                        <input type="date" value={userInfo.contractStart} onChange={e => setUserInfo({...userInfo, contractStart: e.target.value})} className="w-full bg-white/10 border border-white/20 rounded-lg p-2 text-xs mb-2" />
                                        <input type="date" value={userInfo.contractEnd} onChange={e => setUserInfo({...userInfo, contractEnd: e.target.value})} className="w-full bg-white/10 border border-white/20 rounded-lg p-2 text-xs" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400">호봉 선택</label>
                                        <select value={baseInfo.hobong} onChange={e => handleHobongChange(parseInt(e.target.value))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold appearance-none">
                                            {Object.keys(salaryTable).map(h => <option key={h} value={h}>{h}호봉 ({salaryTable[h].toLocaleString()}원)</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Summary Table */}
                        <div className="bg-white rounded-[2rem] shadow-xl border border-slate-200 overflow-hidden">
                            <div className="p-6 border-b bg-slate-50 flex items-center gap-2"><Icon name={Table} size={20} className="text-indigo-600" /><h3 className="font-bold">연간 인건비 소요액 신청 현황</h3></div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[1000px]">
                                    <thead>
                                        <tr className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-tighter">
                                            <th className="p-4 border-b">구분</th>
                                            <th className="p-4 text-right border-b">본봉</th>
                                            <th className="p-4 text-right border-b">교직수당</th>
                                            <th className="p-4 text-right border-b">연구비</th>
                                            <th className="p-4 text-right border-b text-indigo-600">정근가산금</th>
                                            <th className="p-4 text-right border-b">급식비</th>
                                            <th className="p-4 text-right border-b text-orange-600">명절휴가비</th>
                                            <th className="p-4 text-right border-b font-black text-slate-900 bg-slate-100/50">분기총계</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {results.map(res => (
                                            <tr key={res.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4 font-black text-slate-700 text-sm">{res.name}</td>
                                                <td className="p-4 text-right font-mono text-xs">{Math.round(res.basic).toLocaleString()}</td>
                                                <td className="p-4 text-right font-mono text-xs">{Math.round(res.teaching).toLocaleString()}</td>
                                                <td className="p-4 text-right font-mono text-xs">{Math.round(res.research).toLocaleString()}</td>
                                                <td className="p-4 text-right font-mono font-black text-indigo-600">{Math.round(res.jeonggeun + res.jeonggeunAdd).toLocaleString()}</td>
                                                <td className="p-4 text-right font-mono text-xs">{Math.round(res.meal).toLocaleString()}</td>
                                                <td className="p-4 text-right font-mono font-black text-orange-600">{Math.round(res.holiday).toLocaleString()}</td>
                                                <td className="p-4 text-right font-mono font-black bg-slate-100/30">{Math.round(res.total).toLocaleString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                    <tfoot className="bg-slate-900 text-white font-black">
                                        <tr>
                                            <td className="p-5 text-center text-xs">연간 총계</td>
                                            <td className="p-5 text-right font-mono text-xs">{Math.round(results.reduce((s, r) => s + r.basic, 0)).toLocaleString()}</td>
                                            <td className="p-5 text-right font-mono text-xs">{Math.round(results.reduce((s, r) => s + r.teaching, 0)).toLocaleString()}</td>
                                            <td className="p-5 text-right font-mono text-xs">{Math.round(results.reduce((s, r) => s + r.research, 0)).toLocaleString()}</td>
                                            <td className="p-5 text-right font-mono text-xs">{Math.round(results.reduce((s, r) => s + r.jeonggeun + r.jeonggeunAdd, 0)).toLocaleString()}</td>
                                            <td className="p-5 text-right font-mono text-xs">{Math.round(results.reduce((s, r) => s + r.meal, 0)).toLocaleString()}</td>
                                            <td className="p-5 text-right font-mono text-xs">{Math.round(results.reduce((s, r) => s + r.holiday, 0)).toLocaleString()}</td>
                                            <td className="p-5 text-right font-mono text-lg text-yellow-400 border-l border-white/10">{Math.round(results.reduce((s, r) => s + r.total, 0)).toLocaleString()}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>

                        {/* Logs */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {detailedLogs.map((log, idx) => (
                                <div key={idx} className="bg-white rounded-[1.5rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col border-t-4 border-t-indigo-600">
                                    <div className="p-5 bg-slate-50 border-b flex justify-between items-center">
                                        <h4 className="text-xl font-black text-slate-800">{log.month}월분</h4>
                                        <div className="text-[10px] font-bold text-slate-400">8H:{log.fullWorkDays} / 4H:{log.halfWorkDays}</div>
                                    </div>
                                    <div className="p-6 flex-1 space-y-3 text-sm font-bold text-slate-600">
                                        <div className="flex justify-between"><span>본봉(비례)</span><span className="text-slate-900">{Math.round(log.mBasic).toLocaleString()}</span></div>
                                        <div className="flex justify-between"><span>교직수당</span><span className="text-slate-900">{Math.round(log.mTeaching).toLocaleString()}</span></div>
                                        <div className="flex justify-between"><span>연구비</span><span className="text-slate-900">{Math.round(log.mResearch).toLocaleString()}</span></div>
                                        <div className="flex justify-between"><span>급식비</span><span className="text-slate-900">{baseInfo.mealAllowance.toLocaleString()}</span></div>
                                        {log.mJeonggeun > 0 && <div className="flex justify-between text-indigo-600"><span>정근수당</span><span>{Math.round(log.mJeonggeun).toLocaleString()}</span></div>}
                                        {log.mHoliday > 0 && <div className="flex justify-between text-orange-600"><span>명절휴가비</span><span>{Math.round(log.mHoliday).toLocaleString()}</span></div>}
                                    </div>
                                    <div className="p-6 bg-slate-900 text-white flex justify-between items-center">
                                        <span className="text-[10px] font-black opacity-50 uppercase">예상 실수령</span>
                                        <span className="text-xl font-black text-emerald-400 font-mono">{Math.round(log.mNetPay).toLocaleString()}원</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
