<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간제근무 인건비 산정 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
        .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 pb-20">
    <div id="app" class="max-w-[1200px] mx-auto p-4 md:p-8 space-y-8">
        
        <!-- Header -->
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-indigo-600 rounded-2xl text-white shadow-lg"><i class="fa-solid fa-file-invoice-dollar fa-lg"></i></div>
                <div>
                    <h1 class="text-xl font-extrabold text-slate-800">시간제근무 기간제교사 인건비 산정</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Personnel Cost Calculation System</p>
                </div>
            </div>
            <div class="flex items-center gap-3 bg-slate-50 px-4 py-2 rounded-xl border border-slate-100">
                <i class="fa-solid fa-calendar-days text-slate-400 text-xs"></i>
                <span id="header-period-display" class="text-xs font-black text-slate-700">2026-03-01 ~ 2027-02-28</span>
            </div>
        </div>

        <!-- Settings Area -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-900 px-8 py-5 text-white font-bold flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-indigo-400"></i> 근무 및 방학 설정
                </div>
                <div class="p-8 space-y-8">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">소속</label>
                            <input type="text" id="affiliation" placeholder="학교/유치원명" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none" />
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">성명</label>
                            <input type="text" id="userName" placeholder="교사명" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none" />
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-slate-100">
                        <div class="space-y-4">
                            <div class="p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100/50">
                                <span class="text-[11px] font-black text-indigo-600 block mb-3 uppercase tracking-tighter text-xs">여름 방학 (8시간 근무)</span>
                                <div class="flex gap-2">
                                    <input type="date" id="summerStart" value="2026-07-20" class="flex-1 text-xs p-2.5 rounded-lg border border-slate-200 bg-white font-bold" />
                                    <input type="date" id="summerEnd" value="2026-08-20" class="flex-1 text-xs p-2.5 rounded-lg border border-slate-200 bg-white font-bold" />
                                </div>
                            </div>
                            <div class="p-5 bg-slate-50 rounded-2xl border border-slate-200">
                                <span class="text-[11px] font-black text-slate-500 block mb-3 uppercase tracking-tighter text-xs">여름방학 미운영 기간 (4시간 근무)</span>
                                <div class="flex gap-2">
                                    <input type="date" id="summerNonOpStart" class="flex-1 text-xs p-2.5 rounded-lg border border-slate-200 bg-white font-bold" />
                                    <input type="date" id="summerNonOpEnd" class="flex-1 text-xs p-2.5 rounded-lg border border-slate-200 bg-white font-bold" />
                                </div>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="p-5 bg-blue-50/50 rounded-2xl border border-blue-100/50">
                                <span class="text-[11px] font-black text-blue-600 block mb-3 uppercase tracking-tighter text-xs">겨울 방학 (8시간 근무)</span>
                                <div class="flex gap-2">
                                    <input type="date" id="winterStart" value="2026-12-28" class="flex-1 text-xs p-2.5 rounded-lg border border-slate-200 bg-white font-bold" />
                                    <input type="date" id="winterEnd" value="2027-01-31" class="flex-1 text-xs p-2.5 rounded-lg border border-slate-200 bg-white font-bold" />
                                </div>
                            </div>
                            <div class="p-5 bg-slate-50 rounded-2xl border border-slate-200">
                                <span class="text-[11px] font-black text-slate-500 block mb-3 uppercase tracking-tighter text-xs">겨울방학 미운영 기간 (4시간 근무)</span>
                                <div class="flex gap-2">
                                    <input type="date" id="winterNonOpStart" class="flex-1 text-xs p-2.5 rounded-lg border border-slate-200 bg-white font-bold" />
                                    <input type="date" id="winterNonOpEnd" class="flex-1 text-xs p-2.5 rounded-lg border border-slate-200 bg-white font-bold" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-slate-100">
                        <label class="text-[11px] font-black text-rose-500 mb-3 block uppercase">임시공휴일 / 재량휴업일 (0시간 근무)</label>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="date" id="extraHoliday1" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold" />
                            <input type="date" id="extraHoliday2" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold" />
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 space-y-6">
                    <div class="flex items-center gap-2 border-b pb-4 text-slate-800"><i class="fa-solid fa-credit-card text-indigo-600"></i><h3 class="font-bold">지급 기준 설정</h3></div>
                    <div class="space-y-5">
                        <div class="bg-indigo-600 p-5 rounded-2xl text-white shadow-md">
                            <label class="text-[10px] font-black opacity-70 block mb-2 uppercase">계약 전체 기간</label>
                            <div class="space-y-2">
                                <input type="date" id="contractStart" value="2026-03-01" class="w-full bg-white/10 border border-white/20 rounded-lg p-2 text-xs font-bold outline-none" />
                                <input type="date" id="contractEnd" value="2027-02-28" class="w-full bg-white/10 border border-white/20 rounded-lg p-2 text-xs font-bold outline-none" />
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">나의 호봉</label>
                            <select id="hobongSelect" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-black text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary Table -->
        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
            <div class="p-6 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="p-2.5 bg-indigo-600 rounded-xl text-white"><i class="fa-solid fa-table"></i></div>
                    <h3 class="font-black text-slate-800 tracking-tight">연간 인건비 소요액 신청 현황</h3>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table id="summary-table" class="w-full text-left border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                            <th class="p-4 text-center">구분</th>
                            <th class="p-4 text-right">본봉</th>
                            <th class="p-4 text-right">교직수당</th>
                            <th class="p-4 text-right">연구비</th>
                            <th class="p-4 text-right text-indigo-600">정근가산금</th>
                            <th class="p-4 text-right">정액급식비</th>
                            <th class="p-4 text-right text-rose-500">명절휴가비</th>
                            <th class="p-4 text-right">보험료(기관)</th>
                            <th class="p-4 text-right font-black text-slate-900 bg-slate-100/50">분기총계</th>
                        </tr>
                    </thead>
                    <tbody id="summary-body" class="divide-y divide-slate-100"></tbody>
                    <tfoot id="summary-foot" class="bg-slate-900 text-white font-black"></tfoot>
                </table>
            </div>
        </div>

        <!-- Detailed Logs -->
        <div class="space-y-8 pt-10">
            <div class="flex items-center gap-3 px-4">
                <div class="p-2 bg-indigo-100 rounded-lg text-indigo-600"><i class="fa-solid fa-list-check"></i></div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">월별 상세 산출 기초 (근거식 포함)</h2>
            </div>
            <div id="log-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <!-- Actions -->
        <div class="flex flex-wrap justify-center gap-6 mt-16 mb-24">
            <button onclick="saveConfig()" class="flex items-center gap-3 px-10 py-5 bg-indigo-600 text-white rounded-full shadow-2xl font-black text-sm hover:scale-105 active:scale-95 transition-all">
                <i class="fa-solid fa-save"></i> 설정 저장하기 (.json)
            </button>
            <label class="flex items-center gap-3 px-10 py-5 bg-amber-500 text-white rounded-full shadow-2xl font-black text-sm cursor-pointer hover:scale-105 active:scale-95 transition-all">
                <i class="fa-solid fa-file-import"></i> 설정 불러오기 (.json)
                <input type="file" class="hidden" accept=".json" onchange="loadConfig(event)" />
            </label>
            <button onclick="exportToExcel()" class="flex items-center gap-3 px-10 py-5 bg-emerald-600 text-white rounded-full shadow-2xl font-black text-sm hover:scale-105 active:scale-95 transition-all">
                <i class="fa-solid fa-file-excel"></i> 엑셀 다운로드 (.csv)
            </button>
        </div>
    </div>

    <script>
        const salaryTable = {
            1: 2041500, 2: 2103300, 3: 2166000, 4: 2228500, 5: 2291500, 6: 2354400, 7: 2416600,
            8: 2478600, 9: 2495600, 10: 2516700, 11: 2538300, 12: 2585900, 13: 2657500, 14: 2773700,
            15: 2848900, 16: 2924500, 17: 3000600, 18: 3076800, 19: 3152500, 20: 3228600, 21: 3600700,
            22: 3733600, 23: 3865300, 24: 3997500, 25: 4129400, 26: 4261900, 27: 4400100, 28: 4538000,
            29: 4682100, 30: 4826800, 31: 4971100, 32: 5115200, 33: 5261000, 34: 5406400, 35: 5552300,
            36: 5698100, 37: 5844000, 38: 5989700, 39: 6135800, 40: 6281700
        };

        const config = {
            hobong: 14,
            teachingAllowance: 250000,
            researchAllowance: 75000,
            mealAllowance: 160000,
            jeonggeunAdd: 50000,
            insuranceRate: 0.1314
        };

        // Initialize Hobong Select
        const hobongSelect = document.getElementById('hobongSelect');
        Object.keys(salaryTable).forEach(h => {
            const opt = document.createElement('option');
            opt.value = h;
            opt.textContent = `${h}호봉 (${salaryTable[h].toLocaleString()}원)`;
            if (h == 14) opt.selected = true;
            hobongSelect.appendChild(opt);
        });

        function isEightHourDay(dateStr) {
            if (!dateStr) return false;
            const d = new Date(dateStr);
            const sStart = new Date(document.getElementById('summerStart').value);
            const sEnd = new Date(document.getElementById('summerEnd').value);
            const wStart = new Date(document.getElementById('winterStart').value);
            const wEnd = new Date(document.getElementById('winterEnd').value);
            
            const snStart = document.getElementById('summerNonOpStart').value ? new Date(document.getElementById('summerNonOpStart').value) : null;
            const snEnd = document.getElementById('summerNonOpEnd').value ? new Date(document.getElementById('summerNonOpEnd').value) : null;
            const wnStart = document.getElementById('winterNonOpStart').value ? new Date(document.getElementById('winterNonOpStart').value) : null;
            const wnEnd = document.getElementById('winterNonOpEnd').value ? new Date(document.getElementById('winterNonOpEnd').value) : null;
            
            const isInSummer = d >= sStart && d <= sEnd;
            const isInWinter = d >= wStart && d <= wEnd;
            const isSummerNonOp = snStart && snEnd && d >= snStart && d <= snEnd;
            const isWinterNonOp = wnStart && wnEnd && d >= wnStart && d <= wnEnd;
            
            return (isInSummer && !isSummerNonOp) || (isInWinter && !isWinterNonOp);
        }

        function isZeroHourDay(dateStr) {
            const h1 = document.getElementById('extraHoliday1').value;
            const h2 = document.getElementById('extraHoliday2').value;
            return dateStr === h1 || dateStr === h2;
        }

        function calculate() {
            const hobong = parseInt(hobongSelect.value);
            const salary = salaryTable[hobong];
            const quarters = [
                { name: '1분기', months: [3, 4, 5], year: 2026 },
                { name: '2분기', months: [6, 7, 8], year: 2026 },
                { name: '3분기', months: [9, 10, 11], year: 2026 },
                { name: '4분기', months: [12, 1, 2], year: 2026 }
            ];

            const summaryBody = document.getElementById('summary-body');
            const summaryFoot = document.getElementById('summary-foot');
            const logContainer = document.getElementById('log-container');
            const headerPeriod = document.getElementById('header-period-display');
            
            headerPeriod.textContent = `${document.getElementById('contractStart').value} ~ ${document.getElementById('contractEnd').value}`;
            
            summaryBody.innerHTML = '';
            logContainer.innerHTML = '';

            let totalYear = { basic: 0, teaching: 0, research: 0, jeonggeun: 0, meal: 0, holiday: 0, insurance: 0, total: 0 };
            const results = [];

            quarters.forEach((q, qIdx) => {
                let qData = { basic: 0, teaching: 0, research: 0, jeonggeun: 0, meal: 0, holiday: 0, insurance: 0 };
                
                q.months.forEach(m => {
                    const year = (qIdx === 3 && (m === 1 || m === 2)) ? q.year + 1 : q.year;
                    const daysInMonth = new Date(year, m, 0).getDate();
                    let full = 0; let zero = 0;
                    
                    for (let d = 1; d <= daysInMonth; d++) {
                        const cur = `${year}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        if (isEightHourDay(cur)) full++;
                        else if (isZeroHourDay(cur)) zero++;
                    }
                    const half = daysInMonth - full - zero;
                    const ratio = (full * 1.0 + half * 0.5) / daysInMonth;

                    const mBasic = salary * ratio;
                    const mTeaching = config.teachingAllowance * ratio;
                    const mResearch = config.researchAllowance * ratio;
                    const mJeonggeunAdd = config.jeonggeunAdd * ratio;
                    const mMeal = config.mealAllowance;

                    let mJeonggeun = 0;
                    let mHoliday = 0;
                    if ((qIdx === 1 && m === 7) || (qIdx === 3 && m === 1)) mJeonggeun = salary * 0.5 * 0.5;
                    if ((qIdx === 2 && m === 9) || (qIdx === 3 && m === 2)) mHoliday = salary * 0.6 * 0.5;

                    const preTax = mBasic + mTeaching + mResearch + mMeal + mJeonggeun + mJeonggeunAdd + mHoliday;
                    
                    qData.basic += mBasic; qData.teaching += mTeaching; qData.research += mResearch;
                    qData.jeonggeun += (mJeonggeun + mJeonggeunAdd); qData.meal += mMeal; qData.holiday += mHoliday;

                    // Log Card Creation
                    const logCard = document.createElement('div');
                    logCard.className = "bg-white rounded-[2.5rem] shadow-md border border-slate-200 overflow-hidden border-t-8 border-t-indigo-600 flex flex-col";
                    
                    const logicStr = (b, r) => `(${b.toLocaleString()}원 / ${daysInMonth}일) × (${full}일×1.0 + ${half}일×0.5) = ${Math.round(r).toLocaleString()}원`;
                    
                    logCard.innerHTML = `
                        <div class="p-6 bg-slate-50 border-b flex justify-between items-center">
                            <div><h4 class="text-2xl font-black text-slate-800">${year}.${m}월 급여 명세</h4></div>
                            <div class="text-[11px] font-black px-4 py-2 bg-white rounded-full border border-slate-200 shadow-sm flex gap-3">
                                <span class="text-indigo-600">8시간: ${full}일</span>
                                <span class="text-blue-500">4시간: ${half}일</span>
                                <span class="text-rose-400">0시간: ${zero}일</span>
                            </div>
                        </div>
                        <div class="p-8 space-y-5 flex-1">
                            <div class="space-y-1"><span class="text-xs font-black text-slate-700">1. 본봉</span><div class="p-3 bg-indigo-50 border border-indigo-100 rounded-xl text-[10px] font-mono">${logicStr(salary, mBasic)}</div></div>
                            <div class="space-y-1"><span class="text-xs font-black text-slate-700">2. 교직수당</span><div class="p-3 bg-slate-50 border border-slate-100 rounded-xl text-[10px] font-mono">${logicStr(config.teachingAllowance, mTeaching)}</div></div>
                            <div class="space-y-1"><span class="text-xs font-black text-slate-700">3. 교원연구비</span><div class="p-3 bg-slate-50 border border-slate-100 rounded-xl text-[10px] font-mono">${logicStr(config.researchAllowance, mResearch)}</div></div>
                            <div class="space-y-1"><span class="text-xs font-black text-slate-700">4. 정근수당가산금</span><div class="p-3 bg-slate-50 border border-slate-100 rounded-xl text-[10px] font-mono">${logicStr(config.jeonggeunAdd, mJeonggeunAdd)}</div></div>
                            <div class="space-y-1"><span class="text-xs font-black text-slate-700">5. 정액급식비</span><div class="p-3 bg-slate-50 border border-slate-100 rounded-xl text-[10px] font-mono">${config.mealAllowance.toLocaleString()}원 (정액)</div></div>
                            <div class="grid grid-cols-1 gap-3 pt-3 border-t">
                                <div class="space-y-1"><span class="text-xs font-black text-indigo-600">6. 정근수당</span><div class="p-3 bg-indigo-50/30 border border-indigo-100 rounded-xl text-[10px] font-mono">${mJeonggeun > 0 ? '('+salary.toLocaleString()+'원 × 50%) × 50% = '+Math.round(mJeonggeun).toLocaleString()+'원' : '지급 해당 월 아님'}</div></div>
                                <div class="space-y-1"><span class="text-xs font-black text-rose-500">7. 명절휴가비</span><div class="p-3 bg-rose-50/30 border border-rose-100 rounded-xl text-[10px] font-mono">${mHoliday > 0 ? '('+salary.toLocaleString()+'원 × 60%) × 50% = '+Math.round(mHoliday).toLocaleString()+'원' : '지급 해당 월 아님'}</div></div>
                            </div>
                        </div>
                        <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
                            <span class="text-[10px] font-black opacity-50 uppercase">Monthly Total</span>
                            <span class="text-2xl font-black text-yellow-400 font-mono">${Math.round(preTax).toLocaleString()}원</span>
                        </div>
                    `;
                    logContainer.appendChild(logCard);
                });

                const taxable = qData.basic + qData.teaching + qData.research + qData.meal + qData.jeonggeun;
                qData.insurance = (taxable + qData.holiday) * config.insuranceRate;
                qData.total = taxable + qData.holiday + qData.insurance;

                results.push({ name: q.name, ...qData });
                
                totalYear.basic += qData.basic; totalYear.teaching += qData.teaching; totalYear.research += qData.research;
                totalYear.jeonggeun += qData.jeonggeun; totalYear.meal += qData.meal; totalYear.holiday += qData.holiday;
                totalYear.insurance += qData.insurance; totalYear.total += qData.total;

                const row = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 font-black text-slate-700 bg-slate-50/30 text-center">${q.name}</td>
                        <td class="p-4 text-right font-mono font-bold">${Math.round(qData.basic).toLocaleString()}</td>
                        <td class="p-4 text-right font-mono font-bold">${Math.round(qData.teaching).toLocaleString()}</td>
                        <td class="p-4 text-right font-mono font-bold">${Math.round(qData.research).toLocaleString()}</td>
                        <td class="p-4 text-right font-mono font-black text-indigo-600">${Math.round(qData.jeonggeun).toLocaleString()}</td>
                        <td class="p-4 text-right font-mono font-bold">${Math.round(qData.meal).toLocaleString()}</td>
                        <td class="p-4 text-right font-mono font-black text-rose-500">${Math.round(qData.holiday).toLocaleString()}</td>
                        <td class="p-4 text-right font-mono font-bold text-slate-400 text-xs">${Math.round(qData.insurance).toLocaleString()}</td>
                        <td class="p-4 text-right font-mono font-black bg-slate-100/30 text-indigo-900">${Math.round(qData.total).toLocaleString()}</td>
                    </tr>
                `;
                summaryBody.innerHTML += row;
            });

            summaryFoot.innerHTML = `
                <tr>
                    <td class="p-5 text-center text-xs uppercase opacity-70">연간 총계</td>
                    <td class="p-5 text-right font-mono text-xs">${Math.round(totalYear.basic).toLocaleString()}</td>
                    <td class="p-5 text-right font-mono text-xs">${Math.round(totalYear.teaching).toLocaleString()}</td>
                    <td class="p-5 text-right font-mono text-xs">${Math.round(totalYear.research).toLocaleString()}</td>
                    <td class="p-5 text-right font-mono text-xs">${Math.round(totalYear.jeonggeun).toLocaleString()}</td>
                    <td class="p-5 text-right font-mono text-xs">${Math.round(totalYear.meal).toLocaleString()}</td>
                    <td class="p-5 text-right font-mono text-xs">${Math.round(totalYear.holiday).toLocaleString()}</td>
                    <td class="p-5 text-right font-mono text-[10px] opacity-50">${Math.round(totalYear.insurance).toLocaleString()}</td>
                    <td class="p-5 text-right font-mono text-lg text-yellow-400 border-l border-white/10">${Math.round(totalYear.total).toLocaleString()}</td>
                </tr>
            `;
            window.lastResults = results;
            window.lastTotal = totalYear;
        }

        // Listeners for auto-calculate
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('change', calculate);
        });

        // JSON Save/Load
        function saveConfig() {
            const data = {
                userInfo: { affiliation: document.getElementById('affiliation').value, name: document.getElementById('userName').value },
                dates: {
                    summerStart: document.getElementById('summerStart').value, summerEnd: document.getElementById('summerEnd').value,
                    summerNonOpStart: document.getElementById('summerNonOpStart').value, summerNonOpEnd: document.getElementById('summerNonOpEnd').value,
                    winterStart: document.getElementById('winterStart').value, winterEnd: document.getElementById('winterEnd').value,
                    winterNonOpStart: document.getElementById('winterNonOpStart').value, winterNonOpEnd: document.getElementById('winterNonOpEnd').value,
                    extraHoliday1: document.getElementById('extraHoliday1').value, extraHoliday2: document.getElementById('extraHoliday2').value,
                    contractStart: document.getElementById('contractStart').value, contractEnd: document.getElementById('contractEnd').value
                },
                hobong: hobongSelect.value
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `인건비설정_${data.userInfo.name || '미기입'}.json`; a.click();
        }

        function loadConfig(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const d = JSON.parse(event.target.result);
                document.getElementById('affiliation').value = d.userInfo.affiliation;
                document.getElementById('userName').value = d.userInfo.name;
                Object.keys(d.dates).forEach(key => {
                    const el = document.getElementById(key);
                    if (el) el.value = d.dates[key];
                });
                hobongSelect.value = d.hobong;
                calculate();
            };
            reader.readAsText(file);
        }

        function exportToExcel() {
            let csv = "\uFEFF구분,본봉,교직수당,연구비,정근수당합계,정액급식비,명절휴가비,보험료(기관),분기총계\n";
            window.lastResults.forEach(r => {
                csv += `${r.name},${Math.round(r.basic)},${Math.round(r.teaching)},${Math.round(r.research)},${Math.round(r.jeonggeun)},${Math.round(r.meal)},${Math.round(r.holiday)},${Math.round(r.insurance)},${Math.round(r.total)}\n`;
            });
            const t = window.lastTotal;
            csv += `총계,${Math.round(t.basic)},${Math.round(t.teaching)},${Math.round(t.research)},${Math.round(t.jeonggeun)},${Math.round(t.meal)},${Math.round(t.holiday)},${Math.round(t.insurance)},${Math.round(t.total)}\n`;
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `인건비산출결과_${document.getElementById('userName').value || '교사'}.csv`; a.click();
        }

        // Initial Calc
        window.onload = calculate;
    </script>
</body>
</html>
